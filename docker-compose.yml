version: '3.8'

services:
  postgres:
    image: postgres:17.5
    container_name: menuportal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-password
      POSTGRES_DB: menuportal
      TZ: "Europe/Budapest"
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Add the command to pass PostgreSQL configuration parameters
    command: >
      postgres
      -c shared_buffers=8GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
      -c wal_buffers=16MB
      -c checkpoint_timeout=15min
      -c max_wal_size=16GB
      -c effective_cache_size=24GB
      -c log_min_duration_statement=50

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    restart: always
    ports:
      - "3001:3000"

volumes:
  postgres_data:
