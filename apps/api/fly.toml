# fly.toml app configuration file generated for api-muddy-fog-7920 on 2025-09-09T13:20:10+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'api-muddy-fog-7920'
primary_region = 'otp'

[build]

[deploy]
  release_command = "pnpm exec drizzle-kit migrate --config=/usr/src/app/drizzle-prod.config.ts"

[http_service]
  internal_port = 3005
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
