app = "gotenberg-1"
primary_region = "otp"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "3000"

[processes]
# This correctly defines the command that runs your application.
# The base image's entrypoint will handle running it with 'tini'.
app = "gotenberg --gotenberg-build-debug-data=false --api-port-from-env=PORT --log-enable-gcp-fields=true --webhook-disable=true --chromium-auto-start=true --libreoffice-auto-start=false --api-enable-basic-auth --chromium-start-timeout=120s"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
memory = "1.5gb"
cpu_kind = "shared"
cpus = 1
